<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium English | Interactive Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        /* ESTILOS BASE */
        body { font-family: 'Montserrat', sans-serif; background-color: #F8F9FA; color: #121212; margin: 0; text-align: center; }
        header { background-color: #0B192C; padding: 3rem; border-bottom: 4px solid #D4AF37; }
        h1 { font-family: 'Playfair Display', serif; color: #FFFFFF; font-size: 3rem; margin: 0; }
        
        #main-content { display: none; }
        .container { max-width: 600px; margin: 3rem auto; padding: 2rem; background: #fff; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container h2 { font-family: 'Playfair Display', serif; color: #0B192C; margin-bottom: 2rem; }
        
        /* FORMULARIO DE LOGIN */
        #login-form { max-width: 400px; margin: 5rem auto; padding: 2.5rem; background: #fff; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 4px solid #0B192C; }
        #login-form h2 { font-family: 'Playfair Display', serif; color: #0B192C; margin-top: 0; margin-bottom: 1rem; }
        .login-desc { font-size: 0.9rem; color: #666; margin-bottom: 2rem; }
        input[type="password"] { width: 100%; padding: 1rem; margin-bottom: 1.5rem; border: 1px solid #ccc; border-radius: 4px; font-family: 'Montserrat', sans-serif; font-size: 1rem; text-align: center; box-sizing: border-box; }
        input[type="password"]:focus { outline: none; border-color: #D4AF37; box-shadow: 0 0 5px rgba(212, 175, 55, 0.5); }
        .btn-login { background-color: #0B192C; color: #D4AF37; border: none; padding: 1rem; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: 'Montserrat', sans-serif; width: 100%; text-transform: uppercase; letter-spacing: 1px; }
        .btn-login:hover { background-color: #121212; }
        #error-message { color: #d32f2f; font-size: 0.85rem; margin-top: 1.5rem; font-weight: bold; display: none; }

        /* =========================================
           SISTEMA DE CARPETAS DESPLEGABLES
           ========================================= */
        details { margin-bottom: 1rem; text-align: left; }
        summary { list-style: none; cursor: pointer; position: relative; transition: 0.3s; }
        summary::-webkit-details-marker { display: none; } 
        
        /* NIVEL 1: STEP */
        .folder-summary {
            background-color: #0B192C;
            color: #D4AF37;
            padding: 1.5rem;
            font-weight: bold;
            border-radius: 4px;
            text-align: center;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .folder-summary:hover { background-color: #121212; }
        .folder-summary::after { content: '▼'; position: absolute; right: 1.5rem; font-size: 0.9rem; transition: transform 0.3s; }
        details[open] > .folder-summary::after { transform: rotate(180deg); }

        /* NIVEL 2: MITADES - COLORES INVERTIDOS */
        .half-details { margin: 0.5rem 0 0.5rem 1.5rem; } 
        .half-summary {
            background-color: #D4AF37; 
            color: #0B192C;            
            padding: 1.2rem 1.5rem;
            font-weight: bold;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .half-summary:hover { background-color: #C5A028; }
        .half-summary::after { content: '▼'; position: absolute; right: 1.5rem; font-size: 0.8rem; transition: transform 0.3s; color: #0B192C; }
        .half-details[open] > .half-summary::after { transform: rotate(180deg); }

        /* NIVEL 3: SESSIONS */
        .sub-details { margin: 0.5rem 0 0.5rem 1.5rem; } 
        .sub-summary {
            background-color: #0B192C; 
            color: #D4AF37;            
            padding: 1.2rem 1.5rem;
            font-weight: bold;
            border-radius: 4px;
        }
