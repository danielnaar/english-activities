<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium English - Inteligencia Generativa</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0B192C; 
            color: #FFFFFF;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: #121212; 
            padding: 40px;
            border-radius: 8px;
            border-top: 6px solid #D4AF37; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 650px;
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: #D4AF37;
            font-size: 2.5rem;
            margin-bottom: 5px;
            margin-top: 0;
        }

        p.subtitle {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            opacity: 0.8;
            font-family: 'Montserrat', sans-serif;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            color: #D4AF37;
        }

        input, textarea, select {
            width: 100%;
            background-color: #1a1a1a;
            border: 1px solid #333;
            color: #FFFFFF;
            padding: 15px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            box-sizing: border-box;
            border-radius: 4px;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #D4AF37;
        }

        select {
            cursor: pointer;
            appearance: none;
        }

        textarea {
            height: 150px;
            resize: vertical;
        }

        button {
            background-color: #D4AF37;
            color: #0B192C;
            border: none;
            padding: 18px 30px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            font-family: 'Montserrat', sans-serif;
            margin-top: 10px;
        }

        button:hover {
            background-color: #f1c40f;
            transform: translateY(-2px);
        }

        #status {
            margin-top: 20px;
            font-size: 1rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Premium English</h1>
    <p class="subtitle">Generador de PowerPoint Inteligente</p>
    
    <div class="form-group">
        <label for="titulo">Título de la Clase</label>
        <input type="text" id="titulo" placeholder="Ej: Clase 4: Phrasal Verbs">
    </div>

    <!-- NUEVO: Menú desplegable con el cerebro gramatical -->
    <div class="form-group">
        <label for="tema-gramatical">Tema Gramatical (El programa detectará las palabras automáticamente)</label>
        <select id="tema-gramatical">
            <option value="ninguno">Ninguno (No resaltar nada especial)</option>
            <option value="possessive_adjectives">Adjetivos Posesivos (my, your, his...)</option>
            <option value="verb_to_be">Verbo To Be (am, is, are, was...)</option>
            <option value="wh_questions">Wh- Questions (what, where, why...)</option>
            <option value="pronouns_subject">Pronombres Personales (I, you, he...)</option>
            <option value="pronouns_object">Pronombres Objeto (me, you, him...)</option>
            <option value="frequency_adverbs">Adverbios de Frecuencia (always, never...)</option>
            <option value="phrasal_verbs">Phrasal Verbs Comunes (get up, turn on...)</option>
            <option value="articles">Artículos (a, an, the)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="script">Guion o Diálogo</label>
        <textarea id="script" placeholder="Pega el guion aquí..."></textarea>
    </div>

    <button onclick="generarPowerPoint()" id="btn-generar">Descargar PowerPoint</button>
    <div id="status"></div>
</div>

<script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js"></script>

<script>
    // --- EL CEREBRO LINGÜÍSTICO (Base de Conocimiento) ---
    // Aquí puedes agregar más palabras a las listas si en el futuro lo necesitas.
    const diccionarioTemas = {
        "ninguno": [],
        "possessive_adjectives": ["my", "your", "his", "her", "its", "our", "their"],
        "verb_to_be": ["am", "is", "are", "was", "were", "'m", "'s", "'re", "isn't", "aren't", "wasn't", "weren't"],
        "wh_questions": ["what", "when", "where", "who", "why", "how", "which", "whose", "whom"],
        "pronouns_subject": ["i", "you", "he", "she", "it", "we", "they"],
        "pronouns_object": ["me", "you", "him", "her", "it", "us", "them"],
        "frequency_adverbs": ["always", "usually", "often", "sometimes", "hardly ever", "rarely", "never"],
        "articles": ["a", "an", "the"],
        "phrasal_verbs": [
            "get up", "wake up", "turn on", "turn off", "look for", "look after", 
            "give up", "put on", "take off", "go out", "work out", "find out", 
            "grow up", "set up", "break down", "calm down", "catch up", "carry on"
        ]
    };

    function escapeRegExp(string) {
        return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function generarPowerPoint() {
        const tituloInput = document.getElementById('titulo').value.trim();
        const temaSeleccionado = document.getElementById('tema-gramatical').value;
        const scriptInput = document.getElementById('script').value.trim();
        const status = document.getElementById('status');
        const btn = document.getElementById('btn-generar');

        if (!tituloInput || !scriptInput) {
            status.style.color = "#ff4c4c";
            status.innerText = "Error: Debes completar el título y el guion.";
            return;
        }

        btn.innerText = "Analizando texto y generando...";
        btn.disabled = true;
        status.style.color = "#D4AF37";
        status.innerText = "Identificando estructuras gramaticales...";

        // 1. Cargar las palabras a buscar según el tema elegido
        const palabrasClave = diccionarioTemas[temaSeleccionado];

        // 2. Procesar guion
        const lineas = scriptInput.split('\n')
            .map(linea => linea.replace(/^.*?:/g, '').trim())
            .filter(linea => linea.length > 0);

        // 3. Inicializar PPTX
        let pptx = new PptxGenJS();
        pptx.layout = 'LAYOUT_WIDE'; 

        const AZUL_NOCHE = "0B192C";
        const DORADO_EXITO = "D4AF37";
        const BLANCO = "FFFFFF";
        const NEGRO = "121212";
        const GRIS_LINEA = "E0E0E0";

        // 4. Crear Diapositivas
        lineas.forEach((frase, index) => {
            let slide = pptx.addSlide();
            const esUltima = (index === lineas.length - 1);

            let colorFondo = BLANCO;
            if (index === 0) { colorFondo = BLANCO; } 
            else if ((index - 1) % 3 === 0) { colorFondo = AZUL_NOCHE; } 
            else { colorFondo = BLANCO; }

            if (esUltima) colorFondo = AZUL_NOCHE;
            slide.background = { fill: colorFondo };

            let colorTexto = (colorFondo === AZUL_NOCHE) ? BLANCO : NEGRO;
            let colorResaltado = DORADO_EXITO;
            let fuente = "Montserrat";
            let tamano = 36;
            let alineacion = 'left';
            let yPos = 2.0;
            
            if (index === 0) {
                slide.addText(tituloInput, { x: 0.5, y: 0.5, w: "90%", h: 1, fontSize: 44, fontFace: "Playfair Display", color: AZUL_NOCHE, bold: true });
                slide.addShape(pptx.ShapeType.line, { x: 0.5, y: 1.4, w: 8.5, h: 0, line: { color: GRIS_LINEA, width: 1.5 } });
                yPos = 2.2;
            }

            if (esUltima) {
                colorTexto = DORADO_EXITO;
                colorResaltado = BLANCO; 
                fuente = "Playfair Display";
                tamano = 42;
                alineacion = 'center';
                yPos = 1.5;
            }

            let textObjects = [];

            // Si hay palabras que buscar en el diccionario
            if (palabrasClave && palabrasClave.length > 0) {
                // Ordenar las palabras de la más larga a la más corta (Importante para que "look after" se detecte antes que "look")
                const palabrasOrdenadas = [...palabrasClave].sort((a, b) => b.length - a.length);
                const regexParts = palabrasOrdenadas.map(p => `\\b${escapeRegExp(p)}\\b`);
                const regex = new RegExp(`(${regexParts.join('|')})`, 'gi');
                
                const parts = frase.split(regex);

                parts.forEach(part => {
                    if (!part) return; 
                    const esClave = palabrasClave.some(p => p.toLowerCase() === part.toLowerCase());
                    
                    textObjects.push({
                        text: part,
                        options: {
                            color: esClave ? colorResaltado : colorTexto,
                            bold: esClave ? true : false,
                            fontSize: tamano,
                            fontFace: fuente
                        }
                    });
                });
            } else {
                textObjects.push({ text: frase, options: { color: colorTexto, bold: false, fontSize: tamano, fontFace: fuente }});
            }

            slide.addText(textObjects, { x: 0.5, y: yPos, w: "90%", h: 3, align: alineacion, valign: 'middle', lineSpacing: 50 });
        });

        // 5. Guardar y Descargar archivo
        let nombreArchivo = tituloInput.replace(/[^a-z0-9]/gi, '_').toLowerCase() || "clase_premium_english";
        
        pptx.writeFile({ fileName: nombreArchivo + ".pptx" }).then(() => {
            status.style.color = "#4cff4c";
            status.innerText = "¡Descarga completada con éxito!";
            btn.innerText = "Descargar PowerPoint";
            btn.disabled = false;
        }).catch(err => {
            status.style.color = "#ff4c4c";
            status.innerText = "Error al generar: " + err;
            btn.innerText = "Reintentar";
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
