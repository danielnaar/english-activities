<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium English - PowerPoint Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0B192C; /* Azul Noche Premium */
            color: #FFFFFF;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: #121212; /* Negro Ébano */
            padding: 40px;
            border-radius: 8px;
            border-top: 6px solid #D4AF37; /* Dorado Éxito */
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 650px;
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: #D4AF37;
            font-size: 2.5rem;
            margin-bottom: 5px;
            margin-top: 0;
        }

        p.subtitle {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            opacity: 0.8;
            font-family: 'Montserrat', sans-serif;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            color: #D4AF37;
        }

        input, textarea {
            width: 100%;
            background-color: #1a1a1a;
            border: 1px solid #333;
            color: #FFFFFF;
            padding: 15px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            box-sizing: border-box;
            border-radius: 4px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #D4AF37;
        }

        textarea {
            height: 200px;
            resize: vertical;
        }

        button {
            background-color: #D4AF37;
            color: #0B192C;
            border: none;
            padding: 18px 30px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            font-family: 'Montserrat', sans-serif;
            margin-top: 10px;
        }

        button:hover {
            background-color: #f1c40f;
            transform: translateY(-2px);
        }

        #status {
            margin-top: 20px;
            font-size: 1rem;
            font-weight: bold;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #D4AF37;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
            font-weight: bold;
        }
        
        .back-link:hover {
            color: #FFFFFF;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Premium English</h1>
    <p class="subtitle">Generador de PowerPoint Oficial</p>
    
    <div class="form-group">
        <label for="titulo">Título de la Clase</label>
        <input type="text" id="titulo" placeholder="Ej: Clase 2: An Actor and a Musician">
    </div>

    <div class="form-group">
        <label for="script">Guion o Diálogo</label>
        <textarea id="script" placeholder="Pega el guion aquí. Los nombres como 'Alex:' se borrarán automáticamente..."></textarea>
    </div>

    <button onclick="generarPowerPoint()" id="btn-generar">Descargar PowerPoint</button>
    <div id="status"></div>
    
    <a href="index.html" class="back-link">← Volver al Hub Interactivo</a>
</div>

<script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js"></script>

<script>
    function generarPowerPoint() {
        const tituloInput = document.getElementById('titulo').value.trim();
        const scriptInput = document.getElementById('script').value.trim();
        const status = document.getElementById('status');
        const btn = document.getElementById('btn-generar');

        if (!tituloInput || !scriptInput) {
            status.style.color = "#ff4c4c";
            status.innerText = "Error: Debes completar el título y el guion.";
            return;
        }

        btn.innerText = "Generando Archivo...";
        btn.disabled = true;
        status.style.color = "#D4AF37";
        status.innerText = "Procesando manual de marca y generando archivo PPTX...";

        // 1. Procesar el guion (limpiar nombres de personajes)
        const lineas = scriptInput.split('\n')
            .map(linea => linea.replace(/^.*?:/g, '').trim())
            .filter(linea => linea.length > 0);

        // 2. Inicializar PPTX
        let pptx = new PptxGenJS();
        pptx.layout = 'LAYOUT_WIDE'; // Formato 16:9

        const AZUL_NOCHE = "0B192C";
        const DORADO_EXITO = "D4AF37";
        const BLANCO = "FFFFFF";
        const NEGRO = "121212";
        const GRIS_LINEA = "E0E0E0";

        const palabrasClave = ["a", "an", "What", "Why", "Where", "Who", "When", "How"];

        // 3. Crear Diapositivas
        lineas.forEach((frase, index) => {
            let slide = pptx.addSlide();
            const esUltima = (index === lineas.length - 1);

            // Secuencia estricta de Fondos (1W, 2B, 3W, 4W, 5B...)
            let colorFondo = BLANCO;
            if (index === 0) {
                colorFondo = BLANCO;
            } else if ((index - 1) % 3 === 0) {
                colorFondo = AZUL_NOCHE;
            } else {
                colorFondo = BLANCO;
            }

            // Mantenemos la regla de oro: la última diapositiva siempre debe ser Azul
            if (esUltima) colorFondo = AZUL_NOCHE;
            
            slide.background = { fill: colorFondo };

            // Parámetros de texto predeterminados
            let colorTexto = (colorFondo === AZUL_NOCHE) ? BLANCO : NEGRO;
            let colorResaltado = DORADO_EXITO;
            let fuente = "Montserrat";
            let tamano = 36;
            let alineacion = 'left';
            let yPos = 2.0;

            // CONFIGURACIONES ESPECÍFICAS
            
            // Slide 1: Especial con Título
            if (index === 0) {
                // Título en Negrita
                slide.addText(tituloInput, {
                    x: 0.5, y: 0.5, w: "90%", h: 1,
                    fontSize: 44,
                    fontFace: "Playfair Display",
                    color: AZUL_NOCHE,
                    bold: true
                });
                // Línea divisoria
                slide.addShape(pptx.ShapeType.line, {
                    x: 0.5, y: 1.4, w: 8.5, h: 0,
                    line: { color: GRIS_LINEA, width: 1.5 }
                });
                yPos = 2.2;
            }

            // Slide Final: Estilo Elegante
            if (esUltima) {
                colorTexto = DORADO_EXITO;
                colorResaltado = BLANCO; // Resaltado blanco sobre texto dorado
                fuente = "Playfair Display";
                tamano = 42;
                alineacion = 'center';
                yPos = 1.5;
            }

            // Lógica de resaltado (Parsing de palabras clave por límite de palabra)
            let textObjects = [];
            const regex = new RegExp(`(\\b${palabrasClave.join('\\b|\\b')}\\b)`, 'gi');
            const parts = frase.split(regex);

            parts.forEach(part => {
                if (!part) return; // Evitar partes vacías
                
                // Comprobar si esta parte es una palabra clave
                const esClave = palabrasClave.some(p => p.toLowerCase() === part.toLowerCase());
                
                textObjects.push({
                    text: part,
                    options: {
                        color: esClave ? colorResaltado : colorTexto,
                        bold: esClave ? true : false,
                        fontSize: tamano,
                        fontFace: fuente
                    }
                });
            });

            // Añadir la frase procesada a la diapositiva
            slide.addText(textObjects, {
                x: 0.5, y: yPos, w: "90%", h: 3,
                align: alineacion,
                valign: 'middle',
                lineSpacing: 50
            });
        });

        // 4. Guardar y Descargar archivo PPTX
        let nombreArchivo = tituloInput.replace(/[^a-z0-9]/gi, '_').toLowerCase() || "clase_premium_english";
        
        pptx.writeFile({ fileName: nombreArchivo + ".pptx" })
            .then(() => {
                status.style.color = "#4cff4c";
                status.innerText = "¡Descarga completada con éxito!";
                btn.innerText = "Descargar PowerPoint";
                btn.disabled = false;
            })
            .catch(err => {
                status.style.color = "#ff4c4c";
                status.innerText = "Error al generar: " + err;
                btn.innerText = "Reintentar";
                btn.disabled = false;
            });
    }
</script>

</body>
</html>
